# Small local CPU smoke config for validating the H-JEPA code path.
# It keeps the 8/16/32 scale separation but reduces widths/depths for CPU.

seed: 42
model_type: h_jepa_multiscale
data_root: "../data"
output_dir: "outputs/h_jepa_multiscale_cpu_smoke"
device: "cpu"

context_frames: 2
target_frames: 2
frame_stride: 1
gap: 1
window_start_stride: 32
max_windows_per_traj: 1

batch_size: 2
eval_batch_size: 2
num_workers: 0
num_epochs: 1
warmup_epochs: 0

lr: 0.0001
weight_decay: 0.05
grad_clip_norm: 1.0
betas: [0.9, 0.999]
vicreg_eps: 0.0001

img_size: 256
mlp_ratio: 2
drop_path_rate: 0.0

input_channels: 11
spatial_eval_pool: 2
knn_k: 1

collapse_var_threshold: 0.0001
collapse_rank_threshold: 2.0

use_gradient_checkpointing: false
compile_model: false

stats_max_windows: 4
save_every_steps: 100
eval_every_epochs: 1
log_every_steps: 1
max_train_windows_per_split: 4
max_eval_windows_per_split: 4
smoke_max_windows_per_split: 4
smoke_batches_per_epoch: 2

wandb_project: "active-matter-h-jepa"
wandb_run_name: "h_jepa_multiscale_cpu_smoke"
wandb_mode: "disabled"

resume: false

h_jepa:
  levels:
    l1:
      patch_size: 8
      embed_dim: 48
      depth: 1
      num_heads: 4
      loss_type: vicreg
      lambda_inv: 5.0
      lambda_var: 20.0
      lambda_cov: 2.0
      lambda_sig: 0.0
      weight: 1.0
    l2:
      patch_size: 16
      embed_dim: 64
      depth: 1
      num_heads: 4
      loss_type: vicreg_sigreg
      lambda_inv: 5.0
      lambda_var: 15.0
      lambda_cov: 1.0
      lambda_sig: 10.0
      weight: 1.0
    l3:
      patch_size: 32
      embed_dim: 64
      depth: 1
      num_heads: 4
      loss_type: sigreg
      lambda_inv: 5.0
      lambda_var: 0.0
      lambda_cov: 0.0
      lambda_sig: 25.0
      weight: 1.0

  use_cross_level_loss: false
  lambda_cross_12: 0.5
  lambda_cross_23: 0.5
  cross_level_start_epoch: 5
  cross_level_warmup_epochs: 5

  ema_momentum: 0.996
  predictor_depth: 1
  predictor_hidden_mult: 2
  sigreg_eps: 1.0e-8
  frame_batch_size: 2
